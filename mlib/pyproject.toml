[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
  ".venv",
  "SHAD/interactive/node_modules",
  "SHAD/interactive/dist",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
]
ignore = [
  "E501",
  "B905",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
